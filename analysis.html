<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
      body {
        font-family: Arial;
      }
      .plot {
        width: 600px;
        height: 500px;
        display: inline-block;
        vertical-align: top;
        margin: 10px;
      }
      .metrics {
        font-size: 14px;
        margin-top: 5px;
      }
      .controls {
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <h2>Eye Scan Viewer</h2>

    <div class="controls">
      <input type="file" id="files" webkitdirectory multiple />

      <label>
        Mode:
        <select id="mode">
          <option value="count">Error Count</option>
          <option value="ber">BER</option>
          <option value="logber">log10(BER)</option>
        </select>
      </label>

      <label id="toleranceLabel">
        Max Errors:
        <input type="number" id="tolerance" value="0" step="0.1" />
      </label>

      <button id="recalc">Update</button>
    </div>

    <div id="plots"></div>

    <script>
      let storedData = [];

      function updateToleranceUI() {
        const mode = document.getElementById("mode").value;
        const tolInput = document.getElementById("tolerance");
        const label = document.getElementById("toleranceLabel");

        if (mode === "count") {
          tolInput.value = 0;
          tolInput.step = 1;
          label.childNodes[0].nodeValue = "Max Errors: ";
        }

        if (mode === "ber") {
          tolInput.value = 1e-6;
          tolInput.step = 1e-6;
          label.childNodes[0].nodeValue = "Max BER: ";
        }

        if (mode === "logber") {
          tolInput.value = -6;
          tolInput.step = 0.5;
          label.childNodes[0].nodeValue = "Max log10(BER): ";
        }
      }

      function computeZ(data, mode) {
        let zComputed = [];

        for (let i = 0; i < data.z.length; i++) {
          const errors = data.z[i];
          const logSamples = data.samplesLog[i];

          const nSamples = Math.pow(2, logSamples) - 1;

          let value;

          if (mode === "count") {
            value = errors;
          } else if (mode === "ber") {
            value = nSamples > 0 ? errors / nSamples : 0;
          } else if (mode === "logber") {
            const ber = nSamples > 0 ? errors / nSamples : 0;
            value = ber > 0 ? Math.log10(ber) : -12;
          }

          zComputed.push(value);
        }

        return zComputed;
      }

      function computeMetrics(data, zValues, threshold) {
        const dy = Math.abs(data.y[1] - data.y[0]);
        const dx = Math.abs(data.x[1] - data.x[0]);
        const EPS = Math.max(dx, dy) / 2;

        let xPos = [];
        let xNeg = [];
        let yPos = [];
        let yNeg = [];

        for (let i = 0; i < zValues.length; i++) {
          const x = data.x[i];
          const y = data.y[i];
          const z = zValues[i];

          if (z > threshold) continue;

          if (Math.abs(y) < EPS) {
            if (x >= 0) xPos.push(x);
            if (x <= 0) xNeg.push(x);
          }
          if (Math.abs(x) < EPS) {
            if (y >= 0) yPos.push(y);
            if (y <= 0) yNeg.push(y);
          }
        }

        if (
          xPos.length === 0 ||
          xNeg.length === 0 ||
          yPos.length === 0 ||
          yNeg.length === 0
        ) {
          return {
            zeroCount: 0,
            xMin: 0,
            xMax: 0,
            yMin: 0,
            yMax: 0,
            xSpan: 0,
            ySpan: 0,
            rectArea: 0,
            diamondArea: 0,
          };
        }
        const xMax = Math.max(...xPos);
        const xMin = Math.min(...xNeg);
        const yMax = Math.max(...yPos);
        const yMin = Math.min(...yNeg);

        const xSpan = xMax - xMin;
        const ySpan = yMax - yMin;
        const rectArea = xSpan * ySpan;
        const diamondArea = 0.5 * xSpan * ySpan;

        return {
          zeroCount: xPos.length + xNeg.length + yPos.length + yNeg.length,
          xMin,
          xMax,
          yMin,
          yMax,
          xSpan,
          ySpan,
          rectArea,
          diamondArea,
        };
      }

      function computeEyeArea(data, zValues, threshold) {
        const dx = Math.abs(data.x[1] - data.x[0]);
        let slices = new Map();

        for (let i = 0; i < zValues.length; i++) {
          if (zValues[i] > threshold) continue;

          const x = data.x[i];
          const y = data.y[i];

          if (!slices.has(x)) slices.set(x, []);
          slices.get(x).push(y);
        }

        let totalArea = 0;

        slices.forEach((ys, x) => {
          if (ys.length < 2) return;

          const yMin = Math.min(...ys);
          const yMax = Math.max(...ys);

          const height = yMax - yMin;
          totalArea += height * dx;
        });

        return totalArea;
      }

      function computePixelArea(data, zValues, threshold) {
        const uniqueX = [...new Set(data.x)].sort((a, b) => a - b);
        const uniqueY = [...new Set(data.y)].sort((a, b) => a - b);

        if (uniqueX.length < 2 || uniqueY.length < 2) return 0;

        const dx = Math.abs(uniqueX[1] - uniqueX[0]);
        const dy = Math.abs(uniqueY[1] - uniqueY[0]);

        let count = 0;

        for (let i = 0; i < zValues.length; i++) {
          if (zValues[i] <= threshold) count++;
        }

        return count * dx * dy;
      }

      function renderPlots() {
        const container = document.getElementById("plots");
        container.innerHTML = "";

        const tolerance = Number(document.getElementById("tolerance").value);
        const mode = document.getElementById("mode").value;

        storedData.forEach((data) => {
          const zValues = computeZ(data, mode);

          const plotDiv = document.createElement("div");
          plotDiv.className = "plot";

          const metricsDiv = document.createElement("div");
          metricsDiv.className = "metrics";

          const metrics = computeMetrics(data, zValues, tolerance);
          const left = Math.abs(metrics.xMin);
          const right = metrics.xMax;
          const top = metrics.yMax;
          const bottom = Math.abs(metrics.yMin);

          metricsDiv.innerHTML = `
              <b>${data.name}</b><br>
              Mode: ${mode}<br>
              X range: [${metrics.xMin.toFixed(2)}, ${metrics.xMax.toFixed(2)}]<br>
              Y range: [${metrics.yMin.toFixed(2)}, ${metrics.yMax.toFixed(2)}]<br>
              X-span: ${metrics.xSpan.toFixed(2)}<br>
              Y-span: ${metrics.ySpan.toFixed(2)}<br>
              Eye area: ${metrics.rectArea.toFixed(2)} (rectangle) / ${metrics.diamondArea.toFixed(2)} (diamond) <br>
              Eye area (slices): ${computeEyeArea(data, zValues, tolerance).toFixed(2)}<br>
              Pixel area: ${computePixelArea(data, zValues, tolerance).toFixed(2)}<br>
              Left: ${left.toFixed(2)} | Right: ${right.toFixed(2)}<br>
              Top: ${top.toFixed(2)} | Bottom: ${bottom.toFixed(2)}<br>
              `;

          const layout = {
            title: data.name,
            shapes: [
              // Line: horizontal
              {
                type: "line",
                x0: metrics.xMin,
                x1: metrics.xMax,
                y0: 0,
                y1: 0,
                line: {
                  color: "white",
                  width: 3,
                },
              },
              // Line: vertical
              {
                type: "line",
                x0: 0,
                x1: 0,
                y0: metrics.yMin,
                y1: metrics.yMax,
                line: {
                  color: "white",
                  width: 3,
                },
              },
            ],
          };

          container.appendChild(plotDiv);
          container.appendChild(metricsDiv);

          Plotly.newPlot(
            plotDiv,
            [
              {
                x: data.x,
                y: data.y,
                z: zValues,
                type: "heatmap",
                colorscale: "Jet",
              },
            ],
            layout,
          );
        });
      }

      document.getElementById("files").addEventListener("change", function (e) {
        const files = e.target.files;
        storedData = [];

        Array.from(files).forEach((file) => {
          if (!file.name.endsWith(".txt")) return;

          const reader = new FileReader();

          reader.onload = function (event) {
            const text = event.target.result;
            const lines = text.split("\n");

            let x = [];
            let y = [];
            let z = [];
            let samplesLog = [];

            lines.forEach((line) => {
              if (line.startsWith("#") || line.trim() === "") return;

              const parts = line.split(",");
              if (parts.length < 4) return;

              x.push(Number(parts[0]));
              y.push(Number(parts[1]));
              samplesLog.push(Number(parts[2]));
              z.push(Number(parts[3]));
            });

            storedData.push({
              name: file.name,
              x: x,
              y: y,
              z: z,
              samplesLog: samplesLog,
            });

            renderPlots();
          };

          reader.readAsText(file);
        });
      });

      document.getElementById("recalc").addEventListener("click", function () {
        renderPlots();
      });

      document.getElementById("mode").addEventListener("change", function () {
        updateToleranceUI();
        renderPlots();
      });
      updateToleranceUI();
    </script>
  </body>
</html>
