<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
      body {
        font-family: Arial;
      }
      .plot {
        width: 600px;
        height: 500px;
        display: inline-block;
        vertical-align: top;
        margin: 10px;
      }
      .metrics {
        font-size: 14px;
        margin-top: 5px;
      }
      .controls {
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <h2>Eye Scan Viewer</h2>

    <div class="controls">
      <input type="file" id="files" webkitdirectory multiple />

      <label>
        Mode:
        <select id="mode">
          <option value="count">Error Count</option>
          <option value="ber">BER</option>
          <option value="logber">log10(BER)</option>
        </select>
      </label>

      <label id="toleranceLabel">
        Max Errors:
        <input type="number" id="tolerance" value="0" step="0.1" />
      </label>

      <button id="recalc">Update</button>
    </div>

    <div id="plots"></div>

    <script>
      let storedData = [];

      // to be used multiple times, so reuse
      function getSpacing(values) {
        const unique = [...new Set(values)].sort((a, b) => a - b);
        if (unique.length < 2) return 0;

        let diffs = [];
        for (let i = 1; i < unique.length; i++) {
          diffs.push(unique[i] - unique[i - 1]);
        }

        diffs.sort((a, b) => a - b);
        return diffs[Math.floor(diffs.length / 2)];
      }
      function updateToleranceUI() {
        const mode = document.getElementById("mode").value;
        const tolInput = document.getElementById("tolerance");
        const label = document.getElementById("toleranceLabel");

        if (mode === "count") {
          tolInput.value = 0;
          tolInput.step = 1;
          label.childNodes[0].nodeValue = "Max Errors: ";
        }

        if (mode === "ber") {
          tolInput.value = 1e-6;
          tolInput.step = 1e-6;
          label.childNodes[0].nodeValue = "Max BER: ";
        }

        if (mode === "logber") {
          tolInput.value = -6;
          tolInput.step = 0.5;
          label.childNodes[0].nodeValue = "Max log10(BER): ";
        }
      }

      // ---------- computation part, could remove different metrics in future ----------
      function computeZ(data, mode) {
        //compute z values based on mode: raw, ber or logber
        let out = new Array(data.z.length);

        for (let i = 0; i < data.z.length; i++) {
          const errors = data.z[i];
          const nSamples = Math.pow(2, data.samplesLog[i]) - 1;

          if (mode === "count") {
            out[i] = errors;
          } else {
            const ber = nSamples > 0 ? errors / nSamples : 0;

            if (mode === "ber") {
              out[i] = ber;
            } else {
              out[i] = ber > 0 ? Math.log10(ber) : -12;
            }
          }
        }
        return out;
      }

      function computePixelArea(zValues, threshold, dx, dy) {
        // pixel area * number of pixels <= threshold
        let count = 0;
        for (let i = 0; i < zValues.length; i++) {
          if (zValues[i] <= threshold) count++;
        }
        return count * dx * dy;
      }

      function computeEyeArea(data, zValues, threshold, dx) {
        //get y-slices for each x where z <= threshold, get area and sum up
        let slices = new Map();

        for (let i = 0; i < zValues.length; i++) {
          if (zValues[i] > threshold) continue;

          const x = data.x[i];
          const y = data.y[i];

          let s = slices.get(x);
          if (!s) {
            slices.set(x, { min: y, max: y });
          } else {
            if (y < s.min) s.min = y;
            if (y > s.max) s.max = y;
          }
        }

        let area = 0;
        slices.forEach(({ min, max }) => {
          area += (max - min) * dx;
        });

        return area;
      }

      function computeMetrics(data, zValues, threshold, dx, dy) {
        const EPS = Math.max(dx, dy) / 2;

        let xMin = Infinity,
          xMax = -Infinity;
        let yMin = Infinity,
          yMax = -Infinity;

        for (let i = 0; i < zValues.length; i++) {
          if (zValues[i] > threshold) continue;

          const x = data.x[i];
          const y = data.y[i];

          if (Math.abs(y) < EPS) {
            if (x < xMin) xMin = x;
            if (x > xMax) xMax = x;
          }

          if (Math.abs(x) < EPS) {
            if (y < yMin) yMin = y;
            if (y > yMax) yMax = y;
          }
        }

        if (!isFinite(xMin)) {
          return {
            xMin: 0,
            xMax: 0,
            yMin: 0,
            yMax: 0,
            xSpan: 0,
            ySpan: 0,
            rectArea: 0,
            diamondArea: 0,
          };
        }

        const xSpan = xMax - xMin;
        const ySpan = yMax - yMin;

        return {
          xMin,
          xMax,
          yMin,
          yMax,
          xSpan,
          ySpan,
          rectArea: xSpan * ySpan,
          diamondArea: 0.5 * xSpan * ySpan,
        };
      }

      function renderPlots() {
        const container = document.getElementById("plots");
        container.innerHTML = "";

        const threshold = Number(document.getElementById("tolerance").value);
        const mode = document.getElementById("mode").value;

        storedData.forEach((data) => {
          const zValues = computeZ(data, mode);
          const dx = getSpacing(data.x);
          const dy = getSpacing(data.y);

          const pixelArea = computePixelArea(zValues, threshold, dx, dy);
          const sliceArea = computeEyeArea(data, zValues, threshold, dx);
          const metrics = computeMetrics(data, zValues, threshold, dx, dy);

          const plotDiv = document.createElement("div");
          plotDiv.className = "plot";

          const metricsDiv = document.createElement("div");
          metricsDiv.className = "metrics";

          metricsDiv.innerHTML = `
            <b>${data.name}</b><br>
            Mode: ${mode}<br>
            X range: [${metrics.xMin.toFixed(2)}, ${metrics.xMax.toFixed(2)}]<br>
            Y range: [${metrics.yMin.toFixed(2)}, ${metrics.yMax.toFixed(2)}]<br>
            X-span: ${metrics.xSpan.toFixed(2)}<br>
            Y-span: ${metrics.ySpan.toFixed(2)}<br>
            Eye area: ${metrics.rectArea.toFixed(2)} / ${metrics.diamondArea.toFixed(2)}<br>
            Eye area (slices): ${sliceArea.toFixed(2)}<br>
            Pixel area: ${pixelArea.toFixed(2)}<br>
          `;

          container.appendChild(plotDiv);
          container.appendChild(metricsDiv);

          Plotly.newPlot(
            plotDiv,
            [
              {
                x: data.x,
                y: data.y,
                z: zValues,
                type: "heatmap",
                colorscale: "Jet",
              },
            ],
            { title: data.name },
          );
        });
      }
      document.getElementById("files").addEventListener("change", function (e) {
        const files = Array.from(e.target.files);
        storedData = [];

        let pending = files.length;

        files.forEach((file) => {
          if (!file.name.endsWith(".txt")) {
            pending--;
            return;
          }

          const reader = new FileReader();

          reader.onload = function (event) {
            const lines = event.target.result.split("\n");

            let x = [],
              y = [],
              z = [],
              samplesLog = [];

            for (let line of lines) {
              if (line.startsWith("#") || !line.trim()) continue;

              const p = line.split(",");
              if (p.length < 4) continue;

              x.push(+p[0]);
              y.push(+p[1]);
              samplesLog.push(+p[2]);
              z.push(+p[3]);
            }
            // Does the data form a rectangular grid? ----
            const uniqueX = new Set(x);
            const uniqueY = new Set(y);
            const expected = uniqueX.size * uniqueY.size;

            if (x.length !== expected) {
              console.warn(
                `[${file.name}] Ooh input issue, grid mismatch: points=${x.length}, uniqueX=${uniqueX.size}, uniqueY=${uniqueY.size}, expected=${expected}`,
              );
            } else {
              console.log(
                `[${file.name}] Input good, grid OK: points=${x.length} (= ${uniqueX.size} × ${uniqueY.size})`,
              );
            }
            // --------------------------------------------------------

            storedData.push({ name: file.name, x, y, z, samplesLog });

            pending--;
            if (pending === 0) renderPlots();
          };

          reader.readAsText(file);
        });
      });

      document.getElementById("recalc").onclick = renderPlots;
      document.getElementById("mode").onchange = () => {
        updateToleranceUI();
        renderPlots();
      };

      updateToleranceUI();
    </script>
  </body>
</html>
